<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Estrategium Business</title>
  <link rel="stylesheet" href="css/styles.css?v=44" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <span class="brand-main">ESTRATEGIUM</span>
        <span class="brand-sub">BUSINESS</span>
      </a>
      <nav class="nav-actions">
        <a href="index.html#contacto" class="nav-pill">CONTACTO</a>
        <a href="sobre-mi.html" class="nav-pill">SOBRE MÍ</a>
        <a href="implementacion-marca.html" class="nav-pill">IMPLEMENTACIÓN</a>
        <a href="login.html" class="nav-login">LOGIN ESTUDIANTES</a>
      </nav>
    </div>
  </header>

  <main class="login-wrap">
    <form class="login-card" id="loginForm" action="mis-cursos.html">
      <div class="brand-main">ESTRATEGIUM <span style="font-weight:400">BUSINESS</span></div>
      <h2>Welcome!</h2>
      <p class="lc-sub">Use your login credentials to access your account.</p>

      <label>Email</label>
      <div class="input-ico">
        <span>✉️</span>
        <input type="email" id="loginEmail" placeholder="Your Email Address" />
      </div>

      <label>Password</label>
      <div class="input-ico">
        <span>🔒</span>
        <input type="password" id="loginPass" placeholder="Enter password" />
      </div>

      <button class="btn btn-login" type="submit">Login</button>
      <a href="#" class="forgot">Forgot your password?</a>

      <div class="login-divider">o continúa con</div>
      <a class="btn-google" href="mis-cursos.html" id="googleBtn">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continuar con Google
      </a>
    </form>
  </main>

  <script src="js/main.js"></script>

  <!-- Firebase Authentication (Google) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/usuarios-data.js"></script>
  <script>
    document.getElementById('googleBtn').addEventListener('click', function (e) {
      if (window.googleListo && window.loginConGoogle) { e.preventDefault(); window.loginConGoogle('estudiante'); }
    });
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      var email = (document.getElementById('loginEmail').value || '').trim().toLowerCase();
      var pass = (document.getElementById('loginPass').value || '').trim();
      var u = (window.Usuarios ? Usuarios.getAll() : []).filter(function (x) {
        return x.rol === 'Estudiante' && (x.email || '').toLowerCase() === email && (x.clave || '') === pass;
      })[0];
      if (!u) { e.preventDefault(); alert('Correo o contraseña incorrectos, o no estás registrado. Pide acceso al administrador.'); return; }
      if (u.estado !== 'Activo') { e.preventDefault(); alert('Tu cuenta está inactiva. Contacta al administrador.'); return; }
      try {
        localStorage.setItem('estrategium_est', JSON.stringify({ name: u.nombre, email: u.email, rol: 'estudiante', cursos: u.cursos || [] }));
      } catch (x) {}
    });
  </script>
</body>
</html>
