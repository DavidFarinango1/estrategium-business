<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis cursos — Estrategium Business</title>
  <link rel="stylesheet" href="css/styles.css?v=47" />
</head>
<body data-guard="estudiante">

  <!-- Header portal -->
  <header class="portal-header">
    <div class="container portal-nav">
      <a href="mis-cursos.html" class="brand">
        <span class="brand-main">ESTRATEGIUM</span>
        <span class="brand-sub">BUSINESS</span>
      </a>
      <div class="portal-menu">
        <span class="portal-hello">👤 <b data-user-email>tu@correo.com</b></span>
        <div class="portal-dropdown">
          <span class="portal-pill">MIS CURSOS ▾</span>
          <div class="dd-menu" id="misCursosMenu"><a href="mis-cursos.html">Ver todos</a></div>
        </div>
        <div class="portal-dropdown">
          <span class="portal-pill">CUENTA ▾</span>
          <div class="dd-menu">
            <a href="mis-cursos.html">Mis cursos</a>
            <a href="login-estudiantes.html" data-logout="login-estudiantes.html">Cerrar sesión</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Banner -->
  <section class="portal-banner">
    <div class="container"><h1>MIS CURSOS ONLINE</h1></div>
  </section>

  <!-- Cursos (se cargan desde la nube/Firestore) -->
  <section class="section">
    <div class="container" id="portalCursos">
      <p style="text-align:center;color:var(--gray-500);">Cargando tus cursos…</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="brand-main">ESTRATEGIUM</div>
      <div class="brand-sub">BUSINESS</div>
      <div class="copy">© 2026 Estrategium Business — Zona de estudiantes.</div>
    </div>
  </footer>

  <script src="js/main.js"></script>

  <!-- Firebase: sesión + datos de cursos compartidos -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/session.js?v=2"></script>
  <script src="js/cursos-data.js?v=6"></script>
  <script src="js/usuarios-data.js"></script>
  <script>
  (function () {
    var cont = document.getElementById('portalCursos');
    function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }
    function nLecciones(c) { return (c.modulos || []).reduce(function (n, m) { return n + ((m.lecciones || []).length); }, 0); }

    // Cursos en los que está inscrito el estudiante (LEÍDOS EN VIVO desde el admin)
    function inscritos() {
      try {
        var s = JSON.parse(localStorage.getItem('estrategium_est') || 'null');
        if (!s) return null;
        // Busca al estudiante por email y trae sus cursos actuales
        if (window.Usuarios && s.email) {
          var u = Usuarios.getAll().filter(function (x) {
            return x.rol === 'Estudiante' && (x.email || '').toLowerCase() === (s.email || '').toLowerCase();
          })[0];
          if (u) {
            // Actualiza la sesión con lo último
            try { s.cursos = u.cursos || []; localStorage.setItem('estrategium_est', JSON.stringify(s)); } catch (e) {}
            return u.cursos || [];
          }
          // Entró (ej. con Google) pero no está en la lista del admin → lo registra
          if ((s.rol || '').toLowerCase() === 'estudiante') {
            Usuarios.add({ nombre: s.name || s.email, email: s.email, clave: '', cursos: [], rol: 'Estudiante', estado: 'Activo' });
            return [];
          }
        }
        return Array.isArray(s.cursos) ? s.cursos : null;
      } catch (e) { return null; }
    }

    // Enlace de compra según el curso
    function planLink(c) {
      var t = (c.titulo || '').toUpperCase();
      if (t.indexOf('PROFIT') >= 0) return 'checkout-marca-profit.html';
      if (t.indexOf('START') >= 0) return 'checkout-marca-start.html';
      return 'index.html#planes';
    }
    function precioDe(c) {
      if (c.precioLabel && c.precioLabel !== 'BORRADOR') return c.precioLabel;
      var t = (c.titulo || '').toUpperCase();
      if (t.indexOf('PROFIT') >= 0) return 'USD 49';
      if (t.indexOf('START') >= 0) return 'USD 19';
      return '';
    }
    function thumbDe(c) {
      return c.imagen
        ? '<div class="cc-thumb" style="background-image:url(\'' + esc(c.imagen) + '\')"></div>'
        : '<div class="cc-thumb" style="background:linear-gradient(135deg,#102a54,#0a1f44);display:grid;place-items:center;font-size:2.4rem;">' + esc(c.icon || '🎓') + '</div>';
    }
    // Tarjeta de un curso que YA tiene el estudiante
    function cardOwned(c, i) {
      var videos = nLecciones(c) || (c.videoUrl ? 1 : 0);
      return '<div class="course-card"' + (i ? ' style="margin-top:24px"' : '') + '>' +
          thumbDe(c) +
          '<div>' +
            '<h2>' + esc(c.titulo || 'Curso') + '</h2>' +
            '<div class="course-meta"><span>' + videos + ' Videos</span><span>' + ((c.modulos || []).length) + ' Módulos</span></div>' +
            '<a href="curso.html?id=' + encodeURIComponent(c.id) + '" class="btn btn-continue">CONTINUAR</a>' +
          '</div>' +
        '</div>';
    }
    // Tarjeta de un curso DISPONIBLE para comprar
    function cardComprar(c, i) {
      var videos = nLecciones(c) || (c.videoUrl ? 1 : 0);
      var precio = precioDe(c);
      return '<div class="course-card"' + (i ? ' style="margin-top:24px"' : '') + '>' +
          thumbDe(c) +
          '<div>' +
            '<h2>' + esc(c.titulo || 'Curso') + '</h2>' +
            '<div class="course-meta"><span>' + videos + ' Videos</span><span>' + ((c.modulos || []).length) + ' Módulos</span>' +
              (precio ? '<span style="color:var(--gold,#c9a24b);font-weight:700;">' + esc(precio) + '</span>' : '') +
            '</div>' +
            '<a href="' + planLink(c) + '" class="btn btn-continue" style="background:var(--gold,#c9a24b);color:#0a1f44;">ADQUIRIR CURSO</a>' +
          '</div>' +
        '</div>';
    }

    function render(cursos) {
      // No mostramos borradores en el portal del estudiante
      cursos = (cursos || []).filter(function (c) { return c.precioLabel !== 'BORRADOR'; });
      var mis = inscritos();
      // Cursos que ya tiene / cursos disponibles para adquirir
      var owned = mis ? cursos.filter(function (c) { return mis.indexOf(c.titulo) >= 0; }) : cursos;
      var disponibles = mis ? cursos.filter(function (c) { return mis.indexOf(c.titulo) < 0; }) : [];

      // Menú desplegable "MIS CURSOS" con los cursos del estudiante
      var menu = document.getElementById('misCursosMenu');
      if (menu) {
        menu.innerHTML = (owned.length
          ? owned.map(function (c) { return '<a href="curso.html?id=' + encodeURIComponent(c.id) + '">' + esc(c.titulo || 'Curso') + '</a>'; }).join('')
          : '<a href="mis-cursos.html" style="color:var(--gray-500)">Sin cursos asignados</a>') +
          '<a href="mis-cursos.html">Ver todos</a>';
      }

      var html = '';
      if (owned.length) {
        html += owned.map(cardOwned).join('');
      } else {
        html += '<p style="text-align:center;color:var(--gray-500);margin-bottom:8px;">Aún no tienes cursos. Elige un plan y adquiérelo para empezar 👇</p>';
      }

      // Solo mostramos "Cursos disponibles para adquirir" si el estudiante AÚN NO tiene cursos
      // (por ejemplo, quien entra con Google sin comprar). Si ya compró, ve solo su curso.
      if (!owned.length && disponibles.length) {
        html += '<h2 style="text-align:center;color:var(--navy-900,#0a1f44);margin:26px 0 22px;">Cursos disponibles para adquirir</h2>';
        html += disponibles.map(cardComprar).join('');
      }

      if (!owned.length && !disponibles.length) {
        html = '<p style="text-align:center;color:var(--gray-500);">Aún no hay cursos publicados. Vuelve pronto.</p>';
      }

      cont.innerHTML = html;
    }

    if (window.Cursos) Cursos.onChange(render);
    else cont.innerHTML = '<p style="text-align:center;color:var(--gray-500);">No se pudieron cargar los cursos.</p>';
    // Si el admin cambia la asignación (otra pestaña), se actualiza al instante
    if (window.Usuarios) Usuarios.onChange(function () { render(window.Cursos ? Cursos.getCache() : []); });
  })();
  </script>
</body>
</html>
